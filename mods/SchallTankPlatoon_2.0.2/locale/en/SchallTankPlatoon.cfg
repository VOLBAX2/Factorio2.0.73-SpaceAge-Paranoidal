[mod-name]
SchallTankPlatoon=Schall Tank Platoon

[mod-description]
SchallTankPlatoon=Adds different classes and tiers of tanks in-par with power armors, having vehicle equipment grid.\nAims to fill the gaps the vanilla game should have.\nNot overhaul nor OP.  Vanilla oriented and balanced.